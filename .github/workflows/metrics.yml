name: Metrics Card

on:
  schedule:
    - cron: '0 0 * * *' # Si aggiorna automaticamente ogni giorno
  workflow_dispatch: # Ti permette di aggiornarlo a mano quando pubblichi una release

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.svg
          
          # Nasconde tutto il resto e mostra solo i plugin
          base: ""
          
          # Mostra i download
          plugin_downloads: yes
          plugin_downloads_sections: total, latest
          plugin_downloads_uploads: yes
          
          # Opzionale: aggiunge un'animazione carina quando la card si aggiorna
          plugin_achievements: no
          plugin_notable: no
