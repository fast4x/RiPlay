name: Update Project Stats Card

on:
  release:
    types: [published]
  workflow_dispatch:
  schedule:
  - cron: '0 */2 * * *'

permissions:
  contents: write

jobs:
  update-card:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate Stats Card
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Scarica i dati generali del repo (Stars e Forks)
          REPO_DATA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/fast4x/RiPlay")
          STARS=$(echo "$REPO_DATA" | jq '.stargazers_count')
          FORKS=$(echo "$REPO_DATA" | jq '.forks_count')
          
          # 2. Scarica i dati dell'ultima release (Versione e Download ultima versione)
          LATEST_DATA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/fast4x/RiPlay/releases/latest")
          LATEST_VERSION=$(echo "$LATEST_DATA" | jq -r '.tag_name')
          LATEST_DOWNLOADS=$(echo "$LATEST_DATA" | jq '[.assets[].download_count] | add // 0')
          
          # 3. Scarica i download totali (tutte le release)
          TOTAL_DOWNLOADS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/fast4x/RiPlay/releases" | jq '[.[].assets[].download_count] | add // 0')
          
          # Formatta i numeri
          format_number() {
            local num=$1
            if [ "$num" -ge 1000000 ]; then echo "$(echo "scale=1; $num/1000000" | bc)M";
            elif [ "$num" -ge 1000 ]; then echo "$(echo "scale=1; $num/1000" | bc)k";
            else echo "$num";
            fi
          }
          
          TOTAL_FMT=$(format_number $TOTAL_DOWNLOADS)
          LATEST_FMT=$(format_number $LATEST_DOWNLOADS)
          STARS_FMT=$(format_number $STARS)
          FORKS_FMT=$(format_number $FORKS)
          
          # Genera la Card SVG allargata (600px) con 3 sezioni
          cat > download-card.svg << EOF
          <svg width="600" height="120" viewBox="0 0 600 120" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
                <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1" />
              </filter>
              <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#2b3137" />
                <stop offset="100%" stop-color="#383e45" />
              </linearGradient>
            </defs>
            
            <!-- Sfondo della Card -->
            <rect width="600" height="120" rx="12" fill="#ffffff" filter="url(#shadow)" stroke="#e1e4e8" stroke-width="1"/>
            
            <!-- Header -->
            <rect width="600" height="35" rx="12" fill="url(#headerGrad)" />
            <rect y="20" width="600" height="15" fill="url(#headerGrad)" />
            <text x="20" y="24" fill="#ffffff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" font-weight="600">📊 RiPlay Project Stats</text>
            
            <!-- COLONNA 1: Download Totali -->
            <text x="30" y="60" fill="#586069" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="500">TOTAL DOWNLOADS</text>
            <text x="30" y="85" fill="#0366d6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="24" font-weight="700">${TOTAL_FMT}</text>
            
            <!-- Separatore 1 -->
            <line x1="210" y1="45" x2="210" y2="110" stroke="#e1e4e8" stroke-width="1" />
            
            <!-- COLONNA 2: Ultima Versione -->
            <text x="230" y="60" fill="#586069" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="500">LATEST RELEASE</text>
            <text x="230" y="85" fill="#6f42c1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="18" font-weight="700">${LATEST_VERSION}</text>
            <text x="230" y="108" fill="#28a745" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-weight="600">📥 ${LATEST_FMT} downloads</text>
            
            <!-- Separatore 2 -->
            <line x1="410" y1="45" x2="410" y2="110" stroke="#e1e4e8" stroke-width="1" />
            
            <!-- COLONNA 3: Community (Stelle e Fork) -->
            <text x="430" y="60" fill="#586069" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="500">COMMUNITY</text>
            <text x="430" y="85" fill="#e3b341" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="18" font-weight="700">⭐ ${STARS_FMT}</text>
            <text x="430" y="108" fill="#586069" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-weight="600">🍽️ ${FORKS_FMT} forks</text>
          </svg>
          EOF

      - name: Commit and Push Card
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update project stats card [skip ci]"
          file_pattern: download-card.svg
