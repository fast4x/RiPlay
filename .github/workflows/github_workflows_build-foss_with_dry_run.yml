name: Dry run FOSS flavor

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Dry Run FOSS
        env:
          GRADLE_OPTS: "-Xmx2g -XX:MaxMetaspaceSize=512m"
        run: ./gradlew :androidApp:assembleFoss -PBUILD_VARIANT=foss --dry-run

      - name: Clean up sensitive files
        if: always()
        run: |
          rm -rf ${{ runner.temp }}/keystore
          echo "✅ Keystore removed from temporary directory"

      - name: Build Summary
        if: success()
        run: |
          echo "✅ Dry run completed successfully!"